<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- 📱 【超重要：スマホ文字縮小バグ完全解決コード】 -->
    <!-- これを1行入れるだけで、スマホの画面サイズに文字やボタンが等倍でクッキリ大きくフィットします -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ending</title>
    <style>
        body {
            margin: 0;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: "MS明朝", serif;
            transition: background 2s ease;
        }

        /* 裏クリア時に画面を神聖な黒・金デザインにするための特殊クラス */
        body.true-clear-style {
            background: #000000 !important;
        }
        body.true-clear-style #ending-text {
            color: #ffea00 !important; /* 金色の文字 */
        }
        body.true-clear-style #next-stage-popup {
            background: rgba(0, 20, 0, 0.9) !important; /* 深緑・聖なるシールド */
            border: 2px solid #ffea00 !important;
            box-shadow: 0 0 20px rgba(255, 234, 0, 0.6) !important;
        }
        body.true-clear-style .go-extra-btn {
            color: #ffea00 !important;
            border: 1px solid #ffea00 !important;
        }
        body.true-clear-style .go-extra-btn:hover {
            background: #ffea00 !important;
            color: #000 !important;
        }

        .noise-bg {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: url('https://transparenttextures.com');
            opacity: 0;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes noise-anim {
            0% { transform: translate(0,0); }
            10% { transform: translate(-2px,-2px); }
            20% { transform: translate(2px,2px); }
            30% { transform: translate(-2px,4px); }
            100% { transform: translate(0,0); }
        }

        .noise-active {
            opacity: 0.2;
            animation: noise-anim 0.1s infinite;
        }

        #ending-text {
            text-align: center;
            z-index: 10;
            color: #333;
            transition: color 2s ease;
            box-sizing: border-box;
            padding: 20px;
            width: 100%;
            max-width: 450px; /* スマホサイズ内包 */
        }

        /* 💡 パソコン表示時のベース文字サイズを調整 */
        #ending-text h1 { font-size: 2.2rem; opacity: 0; transition: opacity 1.5s ease; margin-bottom: 25px; }
        #ending-text p { font-size: 1.4rem; opacity: 0; transition: opacity 1.5s ease; line-height: 1.8; }

        #fion-text {
            display: block;
            margin-top: 35px;
            font-size: 1.3rem;
            color: #ff4444;
            opacity: 0;
            transition: opacity 3s ease;
        }

        /* 画面下のポップアップ設定 */
        #next-stage-popup {
            position: fixed;
            bottom: -150px; /* 最初は隠しておく */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 400px;
            background: rgba(40, 0, 0, 0.9);
            border: 2px solid #ff4444;
            padding: 25px 20px;
            text-align: center;
            z-index: 100;
            transition: bottom 1s ease-out;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
        }

        #next-stage-popup.show {
            bottom: 60px; /* 浮かび上がる位置 */
        }

        .go-extra-btn {
            background: #000;
            color: #ff4444;
            border: 1px solid #ff4444;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            margin-top: 15px;
            font-size: 16px;
            border-radius: 5px;
        }

        .go-extra-btn:hover {
            background: #ff4444;
            color: #000;
        }

        ruby rt { font-size: 0.6em; }

        /* 📱 【レスポンシブ拡張】スマホ画面（450px以下）の時、文字とスキップボタンをガツンと巨大化させる */
        @media screen and (max-width: 450px) {
            #ending-text h1, body.true-clear-style #t1 {
                font-size: 32px !important;  /* 「ラスボスを倒し、」を非常に大きく */
                margin-bottom: 25px !important;
            }
            #ending-text p {
                font-size: 20px !important;  /* 「冒険はこれで終わった…」を読みやすく */
                line-height: 1.7 !important;
                margin: 15px 0 !important;
            }
            #fion-text {
                font-size: 18px !important;  /* 不穏な赤文字をクッキリ */
                margin-top: 45px !important;
                line-height: 1.6 !important;
            }
            #next-stage-popup {
                width: 90% !important;     
                padding: 20px !important;
            }
            #popup-title {
                font-size: 16px !important;  
                line-height: 1.5 !important;
            }
            .go-extra-btn {
                font-size: 16px !important;  
                padding: 14px 28px !important;
                width: 100% !important;      
                box-sizing: border-box;
            }
            /* 💡 右上の「▶ スキップ」ボタンをスマホの親指で確実にタップできる超快適サイズに巨大化 */
            #manual-skip-btn {
                top: 15px !important;
                right: 15px !important;
                padding: 10px 22px !important; /* ボタン自体の厚み（押しやすさ）をアップ */
                font-size: 16px !important;    /* 「▶ スキップ」の文字自体を大きく */
                border-radius: 25px !important;
                background: rgba(0, 0, 0, 0.85) !important; /* よりクッキリ見やすく */
            }
        }
    </style>
</head>

<body>

    <div class="noise-bg" id="noise"></div>

    <!-- 💡 【新規追加】スキップボタン（最初は非表示、スマホ枠の右上に固定されます） -->
    <button id="manual-skip-btn" style="
        display: none; 
        position: fixed; 
        top: 20px; 
        right: 20px; 
        z-index: 200; 
        background: rgba(0, 0, 0, 0.7); 
        color: #fff; 
        border: 1px solid #555; 
        padding: 6px 14px; 
        font-size: 13px; 
        font-weight: bold; 
        border-radius: 20px; 
        cursor: pointer;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    ">
        ▶ スキップ
    </button>

    <div id="ending-text">
        <h1 id="t1">ラスボスを倒し、</h1>
        <p id="t2">冒険はこれで終わった……</p>
        <span id="fion-text">
            しかし、何やら<ruby>不穏<rt>ふおん</rt></ruby>な雰囲気が漂い始める…
        </span>
    </div>

    <!-- ポップアップ枠 -->
    <div id="next-stage-popup">
        <div id="popup-title" style="color: #fff; margin-bottom: 10px; font-size: 14px;">未知の領域への扉が開かれた…</div>
        <button class="go-extra-btn" id="popup-btn" onclick="goToExtra()">本当の戦いへ向かう</button>
    </div>

<script>
// グローバル変数として定義し、HTML側のonclickから呼び出せるように連動
let goToExtra = function() {}; 

window.addEventListener('DOMContentLoaded', () => {
    // 1. セーブデータを読み込む（現在のステージIDを取得）
    const savedData = JSON.parse(localStorage.getItem('hacksla_data') || '{}');
    const stageId = Number(savedData.currentStageId) || 5;

    // 操作するHTML要素を取得
    const t1 = document.getElementById('t1');
    const t2 = document.getElementById('t2');
    const fionText = document.getElementById('fion-text');
    const noise = document.getElementById('noise');
    const popup = document.getElementById('next-stage-popup');
    const popupTitle = document.getElementById('popup-title');
    const popupBtn = document.getElementById('popup-btn');
    const skipBtn = document.getElementById('manual-skip-btn'); // スキップボタン

    // ⏳ 共通の時間差フェードイン演出（タイムライン）
    setTimeout(() => { if(t1) t1.style.opacity = 1; }, 500);
    setTimeout(() => { if(t2) t2.style.opacity = 1; }, 2000);

    // 2. 【裏ステージ（ステージ8）クリアの演出】
    // 2. 【裏ステージ（ステージ8）クリアの演出】
    if (stageId === 8) {
        // 💡【修正】最初は白い背景をキープし、文字だけをゴールドに変更！
        if (t1) t1.innerText = "✨ TRUE CLEAR ✨";
        if (t2) t2.innerHTML = "あなたは『異界の支配者』を<br>完全に討ち果たした！<br>蠢く赤暗い霧は晴れ、<br>真の平和が訪れた。";
        
        // 3.5秒後に、祝福のメッセージをフェードイン
        setTimeout(() => {
            if (fionText) {
                fionText.style.color = "#ffea00"; // 金色
                fionText.innerHTML = "🎉 裏ステージ、制覇おめでとうございます！！";
                fionText.style.opacity = 1;
            }
        }, 3500);

        // 💥【新規追加】4.5秒後に、画面全体が「ゆっくりと神聖な漆黒（黒＋金デザイン）」へ変化するドラマチック演出！
        setTimeout(() => {
            document.body.classList.add('true-clear-style');
        }, 4500);

        // 6.5秒後に、クリア祝いのポップアップをせり上げる
        const bossTimer = setTimeout(() => {
            if (popupTitle) popupTitle.innerText = "異界の脅威は去った。さぁ戻ろう！";
            if (popupBtn) popupBtn.innerText = "拠点へ戻る";
            if (popup) popup.classList.add('show');
            if (skipBtn) skipBtn.style.display = "none";
        }, 6500);

        // ボタンを押したときの挙動を「拠点へ戻る」に設定
        goToExtra = function() {
            savedData.hasSeenTrueEnding = true;
            savedData.currentStageId = 6;
            localStorage.setItem('hacksla_data', JSON.stringify(savedData));
            location.href = 'home.html';
        };

        if (skipBtn && savedData.hasSeenTrueEnding === true) {
            skipBtn.style.display = "block";
            skipBtn.onclick = () => {
                clearTimeout(bossTimer);
                goToExtra();
            };
        }


    // 3. 【通常ステージ（ステージ5）クリアの演出】
    } else {
        // 元からあった不穏なノイズ演出タイムラインをそのまま実行
        setTimeout(() => {
            if (fionText) fionText.style.opacity = 1;
        }, 3500);

        // 5.5秒後に画面がバグるノイズを発動
        setTimeout(() => {
            if (noise) noise.classList.add('noise-active');
            document.body.style.background = "#200000"; // 薄暗い赤に変色
            if (t1) t1.style.color = "#ff4444";
            if (t2) t2.style.color = "#ff4444";
        }, 5500);

        // 7.5秒後に、異界ゲート解放のポップアップをせり上げる
        const normalTimer = setTimeout(() => {
            if (popup) popup.classList.add('show');
            if (skipBtn) skipBtn.style.display = "none"; // ポップアップが出たらスキップは消す
        }, 7500);

        // ボタンを押したときの挙調を「裏ステージ解放」に設定
        goToExtra = function() {
            // ⭐ 1回見た記憶（フラグ）をセーブデータに刻む
            savedData.hasSeenNormalEnding = true;
            savedData.isExtraUnlocked = true;
            savedData.currentStageId = 6; // 初期値をステージ6にする
            localStorage.setItem('hacksla_data', JSON.stringify(savedData));
            location.href = 'extra_stage_select.html';
        };

        // 💡 既読プレイヤーへのスキップ処理のバインド
        if (skipBtn && savedData.hasSeenNormalEnding === true) {
            skipBtn.style.display = "block"; // 過去に見ていればスキップボタンを表示！
            skipBtn.onclick = () => {
                clearTimeout(normalTimer); // 演出タイマーをすべて停止
                goToExtra(); // 即座にデータを保存して裏の選択画面へワープ
            };
        }
    }
});
</script>

</body>
</html>
