<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バトル画面</title>
    <link rel="stylesheet" href="battle_style.css">
    <!-- ★裏ステージ専用：壁・地面の全境界線を赤く明滅 ＋ 真ボス専用・時空の歪み（超・線増量版）★ -->
    <style>
        /* 1. 【壁と地面の間の線を含め、すべての境界線を赤く染める】 */
        #battle-field,
        #battle-field *,
        #battle-field::before,
        #battle-field::after,
        .character-side,
        [class*="line"], 
        [id*="line"],
        [class*="grid"],
        [id*="grid"],
        [class*="floor"],
        [class*="wall"],
        [class*="border"],
        [id*="border"],
        [class*="divider"],
        [id*="divider"] {
            border-color: #ff2222 !important;
            border-bottom-color: #ff2222 !important;
            border-top-color: #ff2222 !important;
            outline-color: #ff2222 !important;
        }

        /* 2. 画面を三角に欠けさせず、背景線を怪しく赤く明滅させる設定 */
        #battle-field {
            position: relative !important;
            animation: extra-red-glow 2.5s infinite ease-in-out !important;
            box-sizing: border-box !important;
            background-color: #100000;
        }

        /* 🌀【本物再現】クロノトリガー魔王戦・時空の歪み（サイケデリック縦縞ウェーブ） */
        /* 丸い吸い込みではなく、紫・赤・黒の禍々しい歪んだ縦縞模様が永久ループで横に超高速で走り抜けます */
        .chrono-magus-distortion {
            position: absolute !important;
            top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important;
            z-index: 0 !important;
            pointer-events: none !important;
            background: linear-gradient(
                90deg, 
                #000 0%, #150025 15%, #400010 30%, #000 45%, 
                #250035 60%, #000 75%, #300000 90%, #000 100%
            ) !important;
            background-size: 300% 100% !important;
            animation: magus-warp-flow 1.5s infinite linear, magus-twist 4s infinite ease-in-out !important;
            overflow: hidden !important;
        }

        /* 空間を引き裂く、無数の超極細の縦スリットスピードライン（線量を圧倒的限界突破） */
        .chrono-magus-distortion::after {
            content: "" !important;
            position: absolute !important;
            top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important;
            background: repeating-linear-gradient(
                90deg,
                transparent,
                transparent 3px,
                rgba(255, 0, 50, 0.25) 5px,
                rgba(0, 0, 0, 0.4) 8px,
                transparent 12px
            ) !important;
            animation: magus-slit-vibrate 0.1s infinite linear !important; /* 超高速横振動 */
        }

        /* ⏳ アニメーション1：無数の縦縞スピードラインが左から右へ超高速で流れ去る永久ループ */
        @keyframes magus-warp-flow {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        /* ⏳ アニメーション2：空間全体がグニャグニャと斜めに引き裂かれるように激しく波打つウェーブ効果 */
        @keyframes magus-twist {
            0% { 
                filter: hue-rotate(0deg) contrast(1.3) saturate(1.5); 
                transform: skewX(0deg) scale(1); 
            }
            50% { 
                filter: hue-rotate(-40deg) contrast(2) saturate(2.5); 
                transform: skewX(12deg) scale(1.1); 
            }
            100% { 
                filter: hue-rotate(0deg) contrast(1.3) saturate(1.5); 
                transform: skewX(0deg) scale(1); 
            }
        }

        /* ⏳ アニメーション3：スピードラインをパチパチと細かくガタガタと横振動させる */
        @keyframes magus-slit-vibrate {
            0% { transform: translateX(-2px); opacity: 0.8; }
            50% { transform: translateX(3px) scaleY(1.05); opacity: 1; }
            100% { transform: translateX(-2px); opacity: 0.8; }
        }

        /* 真ボス専用：赤いオーラエフェクト */
        img#monster-sprite.true-boss-aura {
            filter: drop-shadow(0 0 15px #ff0000) drop-shadow(0 0 30px #ff3333) !important;
            animation: true-boss-aura-pulse 1.5s infinite ease-in-out !important;
        }

        @keyframes true-boss-aura-pulse {
            0% { filter: drop-shadow(0 0 12px #ff0000) drop-shadow(0 0 25px #ff3333) !important; }
            50% { filter: drop-shadow(0 0 25px #ff0000) drop-shadow(0 0 50px #ff0000) brightness(1.2) !important; }
            100% { filter: drop-shadow(0 0 12px #ff0000) drop-shadow(0 0 25px #ff3333) !important; }
        }

        /* 敵キャラ（雑魚）の攻撃時ブルブル揺れモーション */
        img#monster-sprite.shake-animation {
            display: block !important;
            animation: enemy-attack-shake 0.4s ease-in-out !important;
        }

        @keyframes enemy-attack-shake {
            0% { transform: scale(1) translateX(0) rotate(0deg); }
            15% { transform: scale(1.05) translateX(-15px) rotate(-4deg); }
            30% { transform: scale(1.05) translateX(15px) rotate(4deg); }
            45% { transform: scale(1) translateX(-10px) rotate(-2deg); }
            60% { transform: scale(1) translateX(8px) rotate(2deg); }
            80% { transform: scale(1) translateX(-4px) rotate(-1deg); }
            100% { transform: scale(1) translateX(0) rotate(0deg); }
        }

        /* 💥 【最優先・新規追加】裏ボス・真ボス専用：巨大化した状態のまま、その場で巨体を激しく揺らす設定 */
        img#monster-sprite.boss-giant-mode.shake-animation {
            animation: extra-boss-giant-shake 0.4s ease-in-out !important;
        }

        @keyframes extra-boss-giant-shake {
            0% { transform: scale(1.6) translate(0, 0) rotate(0deg); }
            15% { transform: scale(1.65) translate(-15px, 0) rotate(-3deg); }
            30% { transform: scale(1.65) translate(15px, 0) rotate(3deg); }
            45% { transform: scale(1.6) translate(-10px, 0) rotate(-1deg); }
            60% { transform: scale(1.6) translate(8px, 0) rotate(1deg); }
            100% { transform: scale(1.6) translate(0, 0) rotate(0deg); }
        }

        /* 背景明滅アニメーション */
        @keyframes extra-red-glow {
            0% { box-shadow: inset 0 0 15px rgba(54, 9, 204, 0.5) !important; }
            50% { box-shadow: inset 0 0 45px rgba(255, 0, 0, 0.9) !important; }
            100% { box-shadow: inset 0 0 15px rgba(2, 187, 249, 0.5) !important; }
        }

        /* 👾 裏ステージの雑魚モンスター専用のサイズアップ設定 */
        img#monster-sprite {
            width: 140px !important;  
            height: auto !important;
            max-width: 150px !important;
            object-fit: contain !important;
            transition: transform 0.1s ease, opacity 0.5s ease-out !important; 
        }

        /* ⚠️ 大ボス（異界の支配者や最恐タッグ）が出現した時は、さらに巨大（画面いっぱい）にする設定を最優先 */
        img#monster-sprite.boss-giant-mode {
            width: 220px !important;  
            max-width: 240px !important;
        }
    </style>
</head>

<body>
<div id="game-container">
    <!-- 上半分：バトルフィールド -->
    <div id="battle-field">
        <!-- 時空の歪み背景を出し入れするための専用コンテナ層 -->
        <div id="extra-distortion-bg"></div>

        <div id="boss-curtain"></div>
        <!-- 敵サイド -->
        <div class="character-side" id="enemy-side">
            <div id="damage-effect"></div>
            <img src="assets/enemy.png" id="monster-sprite" alt="モンスター">
            <div class="hp-bar-container">
                <div id="hp-bar-fill"></div>
            </div>
        </div>

        <!-- プレイヤーサイド -->
        <div class="character-side" id="player-side">
            <div class="hp-bar-container">
                <div id="player-hp-bar-fill" style="background-color: #0088ff; width: 100%;"></div>
            </div>
            <img src="assets/player.png" id="player-sprite" alt="プレイヤー">
            <div id="player-damage-effect"></div>
        </div>

        <!-- 帰還ボタン -->
        <button id="home-return-button" onclick="location.href='home.html'" style="display: none;">
            拠点へ戻る
        </button>
    </div>

    <!-- 下半分：UIコンテナ -->
    <div id="ui-container">
        <div class="ui-slot" id="log-slot">
            <h1 id="monster-name">モンスター</h1>
            <p id="message-text">冒険開始！</p>
        </div>
        <div class="ui-slot" id="item-slot">
            <button id="heal-button" style="width: 100%; height: 100%; background-color: #27ae60; color: white; font-weight: bold; border: 2px solid #fff; border-radius: 4px; cursor: pointer; font-size: 20px;">
                回復薬 (<span id="potion-count">0</span>)
            </button>
        </div>
        <div class="ui-slot" id="level-slot">
            <div style="font-size: 14px; font-weight: bold; color: #ffcc00; margin-bottom: 2px;">
                Lv. <span id="level-text">1</span>
            </div>
            <div class="exp-bar-outer" style="width: 100%; height: 10px; background: #111; border: 1px solid #444; border-radius: 5px; overflow: hidden; margin: 4px 0; position: relative;">
                <div id="exp-bar-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00ff88, #00aa55); transition: width 0.4s ease-out;"></div>
            </div>
            <div style="font-size: 10px; color: #aaa;">
                NEXT: <span id="exp-needed-text">---</span>
            </div>
        </div>
        <div class="ui-slot">
            <button id="attack-button">攻撃</button>
        </div>
    </div>

    <!-- ゲームオーバーモーダル -->
    <div id="gameover-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 style="color: #ff0000;">GAME OVER</h2>
            <p>力尽きてしまった...</p>
            <button onclick="location.href='home.html'" style="padding: 10px 20px; cursor: pointer;">拠点へ戻る</button>
        </div>
    </div>

</div>
    <script src="items.js"></script>
    <script src="extra_monsters.js"></script>
    <script src="extra_battle.js"></script>
</body>
</html>
