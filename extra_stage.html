<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バトル画面</title>
    <link rel="stylesheet" href="battle_style.css">
    <!-- ★裏ステージ専用：壁と地面の間を含め、すべての境界線を一括で赤く上書き明滅★ -->
    <style>
        /* 1. 【壁と地面の間の境界線をピンポイントで狙い撃ち＋全背景線を赤く染める】 */
        /* 外枠、子要素だけでなく、壁と地面の仕切り（border）やキャラクターサイドの境界線、 */
        /* さらにはあらゆる仕切り線要素を漏れなく強制的に赤く発光させます */
        #battle-field,
        #battle-field *,
        #battle-field::before,
        #battle-field::after,
        .character-side,
        [class*="line"], 
        [id*="line"],
        [class*="grid"],
        [id*="grid"],
        [class*="floor"],
        [class*="wall"],
        [class*="border"],
        [id*="border"],
        [class*="divider"],
        [id*="divider"] {
            border-color: #ff2222 !important;
            border-bottom-color: #ff2222 !important;
            border-top-color: #ff2222 !important;
            outline-color: #ff2222 !important;
        }

        /* 2. 画面を三角に欠けさせず、壁と地面の境界線そのものを怪しく赤く明滅させる設定 */
        /* filterを全体にかけるとブラウザのバグで三角に削れるため、インナーグロウと赤線の明滅を完全同期させます */
        #battle-field {
            position: relative !important;
            animation: extra-red-glow 2.5s infinite ease-in-out !important;
            box-sizing: border-box !important;
        }

        /* 3. 💥 【超強化・完全点火】敵キャラの攻撃時ブルブル揺れモーション */
        /* 画像単体をピンポイントで狙い撃ちし、親要素の明滅アニメーションと100%完全に独立させて揺らします */
        img#monster-sprite.shake-animation {
            display: block !important;
            animation: enemy-attack-shake 0.4s ease-in-out !important;
        }

        @keyframes enemy-attack-shake {
            0% { transform: scale(1) translateX(0) rotate(0deg); }
            15% { transform: scale(1.05) translateX(-15px) rotate(-4deg); }
            30% { transform: scale(1.05) translateX(15px) rotate(4deg); }
            45% { transform: scale(1) translateX(-10px) rotate(-2deg); }
            60% { transform: scale(1) translateX(8px) rotate(2deg); }
            80% { transform: scale(1) translateX(-4px) rotate(-1deg); }
            100% { transform: scale(1) translateX(0) rotate(0deg); }
        }

        /* 背景色と「壁と地面の境界線」を含めたすべての赤線を同時に禍々しく呼吸させる明滅アニメーション */
        @keyframes extra-red-glow {
            0% {
                background-color: rgba(25, 0, 0, 0.95) !important;
                box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.5) !important;
                filter: saturate(1) brightness(0.9);
            }
            50% {
                background-color: rgba(65, 0, 0, 0.85) !important;
                box-shadow: inset 0 0 45px rgba(255, 0, 0, 0.9) !important;
                /* すべての境界線とグリッドの赤発光の輝度を限界突破させ、パチパチと明滅させます */
                filter: saturate(2) brightness(1.3) drop-shadow(0 0 4px #ff0000);
            }
            100% {
                background-color: rgba(25, 0, 0, 0.95) !important;
                box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.5) !important;
                filter: saturate(1) brightness(0.9);
            }
        }
    </style>
</head>

<body>
<div id="game-container">
    <!-- 上半分：バトルフィールド -->
    <div id="battle-field">
        <div id="boss-curtain"></div>
        <!-- 敵サイド -->
        <div class="character-side" id="enemy-side">
            <div id="damage-effect"></div>
            <!-- モンスター画像 -->
            <img src="assets/enemy.png" id="monster-sprite" alt="モンスター">
            <div class="hp-bar-container">
                <div id="hp-bar-fill"></div>
            </div>
        </div>

        <!-- プレイヤーサイド -->
        <div class="character-side" id="player-side">
            <div class="hp-bar-container">
                <div id="player-hp-bar-fill" style="background-color: #0088ff; width: 100%;"></div>
            </div>
            <img src="assets/player.png" id="player-sprite" alt="プレイヤー">
            <div id="player-damage-effect"></div>
        </div>

        <!-- 帰還ボタン -->
        <button id="home-return-button" onclick="location.href='home.html'" style="display: none;">
            拠点へ戻る
        </button>
    </div>

    <!-- 下半分：UIコンテナ -->
    <div id="ui-container">
        <!-- 1. 左上 -->
        <div class="ui-slot" id="log-slot">
            <h1 id="monster-name">モンスター</h1>
            <p id="message-text">冒険開始！</p>
        </div>
        <!-- 2. 右上：回復薬ボタン -->
        <div class="ui-slot" id="item-slot">
            <button id="heal-button" style="width: 100%; height: 100%; background-color: #27ae60; color: white; font-weight: bold; border: 2px solid #fff; border-radius: 4px; cursor: pointer; font-size: 20px;">
                回復薬 (<span id="potion-count">0</span>)
            </button>
        </div>

        <!-- 3. 左下：ステータス -->
        <div class="ui-slot" id="level-slot">
            <div style="font-size: 14px; font-weight: bold; color: #ffcc00; margin-bottom: 2px;">
                Lv. <span id="level-text">1</span>
            </div>
            <div class="exp-bar-outer" style="width: 100%; height: 10px; background: #111; border: 1px solid #444; border-radius: 5px; overflow: hidden; margin: 4px 0; position: relative;">
                <div id="exp-bar-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #00ff88, #00aa55); transition: width 0.4s ease-out;"></div>
            </div>
            <div style="font-size: 10px; color: #aaa;">
                NEXT: <span id="exp-needed-text">---</span>
            </div>
        </div>

        <!-- 4. 右下：攻撃ボタン -->
        <div class="ui-slot">
            <button id="attack-button">攻撃</button>
        </div>
    </div>

    <!-- ゲームオーバーモーダル -->
    <div id="gameover-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2 style="color: #ff0000;">GAME OVER</h2>
            <p>力尽きてしまった...</p>
            <button onclick="location.href='home.html'" style="padding: 10px 20px; cursor: pointer;">拠点へ戻る</button>
        </div>
    </div>

</div>
    <script src="items.js"></script>
    <script src="extra_monsters.js"></script>
    <script src="extra_battle.js"></script>
</body>
</html>
