<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="view port" content="width=device-width, initial-scale=1.0">
    <title>Simple Hack and Slash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="status">
            <p>プレイヤー攻撃力: <span id="player-atk">10</span></p>
            <p>敵HP: <span id="enemy-hp">50</span></p>
        </div>
        <div id="log">敵が現れた！</div>
        <button id="attack-btn">攻撃する！</button>
        <div id="inventory">
            <h3>所持品 (タップで装備)</h3>
            <ul id="item-list"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
