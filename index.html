<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハクスラ冒険</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
    <div id="battle-field">
        <div class="character-side" id="enemy-side">
            <div id="damage-effect"></div>
            <div id="monster-sprite">👾</div>
            <div class="hp-bar-container">
                <div id="hp-bar-fill"></div>
            </div>
        </div>
        <div class="character-side" id="player-side">
            <div id="player-sprite">⚔️</div>
        </div>
    </div>
    <div id="ui-container">
        <div id="info-panel">
            <div id="log-area">
                <h1 id="monster-name">スライムがあらわれた！</h1>
                <p id="message-text">冒険がはじまった！</p>
            </div>
            <div id="level-area">
                <p>Lv: <span id="level-text">1</span> (Exp: <span id="exp-text">0</span>)</p>
            </div>
        </div>
    <!-- 将来的にボタンが4つ並ぶ場所 -->
    <div id="command-panel">
        <button id="attack-button">攻撃</button>
        <div class="empty-slot"></div> <!-- 2つ目（右上）の空き -->
        <div class="empty-slot"></div> <!-- 3つ目（左下）の空き -->
        <div class="empty-slot"></div> <!-- 4つ目（右下）の空き -->
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
