<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ハクスラ冒険</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
    <div id="battle-field">
        <div class="character-side" id="enemy-side">
            <div id="damage-effect"></div>
            <div id="monster-sprite">👾</div>
            <div class="hp-bar-container">
                <div id="hp-bar-fill"></div>
            </div>
        </div>
        <div class="character-side" id="player-side">
            <div id="player-sprite">⚔️</div>
        </div>
    </div>
    <div id="ui-container">
        <!-- 1. 左上：モンスター名とログ -->
        <div class="ui-slot" id="log-slot">
            <h1 id="monster-name">スライム</h1>
            <p id="message-text">冒険開始！</p>
        </div>

        <!-- 2. 右上：将来の魔法ボタンなど（今は空き） -->
        <div class="ui-slot empty-slot">（空き）</div>

        <!-- 3. 左下：レベル情報 -->
        <div class="ui-slot" id="level-slot">
            <p>Lv: <span id="level-text">1</span></p>
            <p>Exp: <span id="exp-text">0</span></p>
        </div>

        <!-- 4. 右下：メインコマンド -->
        <div class="ui-slot">
            <button id="attack-button">剣で斬る</button>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
