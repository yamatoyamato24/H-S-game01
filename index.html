<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オープニング</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* オープニング専用のシンプルなデザイン */
        .title-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #000, #222);
        }
        .start-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #cc0000;
            color: white;
            border: 2px solid white;
            cursor: pointer;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="title-screen">
        <h1>練習用冒険</h1>
        <button class="start-btn" onclick="location.href='home.html'">冒険を始める</button>
    </div>
</body>
</html>
