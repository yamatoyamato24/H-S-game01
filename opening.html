<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- スマホで見るために必須の一行 -->
    <title>オープニング</title>
    <link rel="stylesheet" href="opening_style.css">
    <!-- <style>タグの中身は opening_style.css に移したので削除してスッキリさせました -->
</head>
<body>    
    <!-- クラス名を opening-container に変更してCSSと連動させます -->
    <div class="opening-container">
        <!-- ★ここから追加：歯車メニューのHTML -->
        <div id="home-menu-wrapper">
            <button id="gear-button">⚙</button>
            <div id="home-menu-list" style="display: none;">
                <button id="reset-button">データリセット</button>
            </div>
        </div>
    
    <div id="reset-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>データをリセットしますか？</h3>
            <p>この操作は取り消せません。</p>
            <div class="modal-buttons">
                <button id="modal-cancel">やめる</button>
                <button id="modal-confirm">リセットする</button>
            </div>
        </div>
    </div>

        <div class="title-logo">
            <h1>練習用冒険</h1>
            <p>~ はじまりの地 ~</p>
        </div>

        <button class="start-button" onclick="location.href='home.html'">
            冒険を始める
        </button>
    </div>

    <!-- リセット処理用のスクリプトを追加 -->
    <script src="opening.js"></script>

</body>
</html>
