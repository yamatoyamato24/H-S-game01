<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステージ選択</title>
    <link rel="stylesheet" href="stage_select_style.css">
</head>
<body>
    <div class="stage-container">
        <!-- 3D回転カーソル本体 -->
        <div id="selection-cursor">
            <div class="layer layer1"></div>
            <div class="layer layer2"></div>
            <div class="layer layer3"></div>
        </div>

        <!-- 【重要】ステージ番号を識別するための非表示/配置用エリア -->
        <!-- JSでここにあるボタンの座標を拾ってカーソルを移動させます -->
        <div class="stage-nodes-container" style="display:none;">
            <div class="stage-node" data-stage-id="1"></div>
            <div class="stage-node" data-stage-id="2"></div>
            <div class="stage-node" data-stage-id="3"></div>
            <div class="stage-node" data-stage-id="4"></div>
            <div class="stage-node" data-stage-id="5"></div>
        </div>

        <!-- UIエリア（操作パネル） -->
        <div class="stage-ui-wrapper">
            <div id="stage-info">
                <span id="stage-title">ステージ 1</span><br>
                <small id="stage-description">はじまりの草原</small>
            </div>
            
            <div class="stage-buttons">
                <!-- クラス名を整理してCSSと合わせます -->
                <button id="prev-btn" class="stage-btn control-btn">◀ 戻る</button>
                <button id="next-btn" class="stage-btn control-btn">次へ ▶</button>
            </div>

            <!-- 決定ボタンを独立させて押しやすく -->
            <button id="decide-btn" class="stage-btn">出撃！</button>
        </div>
    </div>
    <script src="stage_select.js"></script>
</body>
</html>
