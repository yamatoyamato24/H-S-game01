<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ステージ選択</title>
    <link rel="stylesheet" href="stage_select_style.css">
</head>
<body>
    <div class="stage-container">
        <!-- 1. 拠点へ戻るボタン（左上に配置） -->
        <button id="home-return-button" onclick="location.href='home.html'">
            ◀ 拠点へ
        </button>

        <!-- 2. 3D回転カーソル（魔法陣） -->
        <div id="selection-cursor">
            <div class="layer layer1"></div>
            <div class="layer layer2"></div>
            <div class="layer layer3"></div>
        </div>

        <!-- 3. UIエリア（下部に中央寄せで配置） -->
        <div class="stage-ui-wrapper">

            <!-- 【通常・裏の切り替え連動エリア】解放時のみ block に変化させます -->
            <div id="extra-switch-container" style="display: none; margin-bottom: 15px;">
                <button id="toggle-extra-mode" style="background: #400; color: #f44; border: 1px solid #f44; padding: 8px 20px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(255,0,0,0.5);" onclick="location.href='extra_stage_select.html'">
                    <<  冥界の門を開く（裏ステージへ）>>
                </button>
            </div>

            <!-- ステージ情報表示 -->
            <div id="stage-info">
                <span id="stage-title">ステージ 1</span><br>
                <small id="stage-description">はじまりの草原</small>
            </div>
            
            <!-- ボタン並び： ←戻る 決定 次へ→ -->
            <div class="stage-buttons">
                <button id="prev-btn" class="stage-btn control-btn">←戻る</button>
                <button id="decide-btn" class="stage-btn">決定</button>
                <button id="next-btn" class="stage-btn control-btn">次へ→</button>
            </div>
        </div> 
    </div> <!-- stage-container 閉じ -->

    <!-- 通常ステージ選択画面用のメインスクリプト（既存であれば活かしてください） -->
    <script src="stage_select.js"></script>

    <!-- 【最重要】裏ステージ解放状態チェック＆ボタン点火スクリプト -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // 1. セーブデータを読み込む
        const savedData = JSON.parse(localStorage.getItem('hacksla_data') || '{}');

        // 2. 裏ステージ（異界）の解放フラグが立っているかチェック
        if (savedData.isExtraUnlocked === true) {
            // HTMLの中に最初から用意されているスイッチ容器をキャッチ
            const extraSwitchContainer = document.getElementById('extra-switch-container');
            
            if (extraSwitchContainer) {
                // display: none を上書きして、ステージ情報のすぐ上に美しく出現させる！
                extraSwitchContainer.style.display = "block";
            }
        }
    });
    </script>
</body>
</html>
